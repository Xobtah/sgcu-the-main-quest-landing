<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>the main quest</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='%23a37c30'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Parchment palette — matches Quest Log / Lunch Picker */
      --paper:        #f1e6c9;
      --paper-deep:   #e7d8b1;
      --paper-edge:   #c9b888;
      --ink:          #2b2014;
      --ink-soft:     #4a3a26;
      --ink-faint:    #8a7a5d;
      --rule:         #b8a473;
      --gold:         #a37c30;
      --gold-bright:  #c79a3e;
      --oxblood:      #7a2c28;

      --border:       rgba(74, 58, 38, 0.18);
      --border-hover: rgba(163, 124, 48, 0.85);
      --shadow-hover: 0 10px 28px -10px rgba(43, 32, 20, 0.22);

      --serif:      'Cormorant Garamond', Georgia, serif;
      --serif-body: 'EB Garamond', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif-body);
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain overlay — ink-on-paper texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.08  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      opacity: 0.32;
      mix-blend-mode: multiply;
      z-index: 1;
    }

    ::selection { background: var(--gold); color: var(--paper); }

    /* Page frame */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 1240px;
      margin: 0 auto;
      padding: 1.75rem 2.5rem 2.5rem;
    }

    /* Hero */
    .hero {
      flex: 0 0 auto;
      padding: 6.5rem 0 4rem;
      text-align: center;
      animation: rise 0.9s cubic-bezier(.2,.7,.2,1) 0.05s both;
    }
    .hero h1 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(3.25rem, 8.5vw, 6.25rem);
      line-height: 0.95;
      letter-spacing: -0.022em;
      color: var(--ink);
    }
    .flourish {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.6rem 0 1rem;
      color: var(--gold);
      opacity: 0.85;
    }
    .flourish .line { width: 56px; height: 1px; background: currentColor; }
    .flourish .diamond {
      width: 5px; height: 5px;
      background: currentColor;
      transform: rotate(45deg);
    }
    .hero .tagline {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.05rem, 1.8vw, 1.3rem);
      color: var(--ink-soft);
      letter-spacing: 0.005em;
    }

    /* Quests grid */
    .quests {
      flex: 1 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding: 1.5rem 0;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 1.9rem 1.9rem 1.9rem;
      min-height: 248px;
      background: var(--paper-deep);
      border: 1px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(43, 32, 20, 0.04);
      transition:
        border-color 0.45s cubic-bezier(.2,.7,.2,1),
        transform 0.45s cubic-bezier(.2,.7,.2,1),
        box-shadow 0.45s ease,
        background 0.45s ease;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(.2,.7,.2,1) both;
    }
    .card:nth-child(1) { animation-delay: 0.18s; }
    .card:nth-child(2) { animation-delay: 0.28s; }
    .card:nth-child(3) { animation-delay: 0.38s; }
    .card:nth-child(4) { animation-delay: 0.48s; }
    .card:nth-child(5) { animation-delay: 0.58s; }
    .card:nth-child(6) { animation-delay: 0.68s; }
    .card:nth-child(7) { animation-delay: 0.78s; }
    .card:nth-child(8) { animation-delay: 0.88s; }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .card:hover::after { opacity: 0.75; }
    .card:hover .arrow { transform: translateX(5px); color: var(--oxblood); }
    .card:hover .icon-wrap { color: var(--oxblood); }
    .card:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 4px;
    }

    .card-head {
      margin-bottom: 1.75rem;
      line-height: 0;
    }
    .icon-wrap {
      color: var(--gold);
      transition: color 0.45s ease;
      line-height: 0;
    }
    .icon-wrap svg {
      width: 42px;
      height: 42px;
      display: block;
    }

    .card-body { margin-top: auto; padding-right: 2.25rem; }
    .card-body h2 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 1.95rem;
      line-height: 1.05;
      letter-spacing: -0.012em;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }
    .card-body p {
      font-family: var(--serif-body);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--ink-soft);
    }

    .arrow {
      position: absolute;
      right: 1.6rem;
      bottom: 1.5rem;
      font-family: var(--serif);
      font-size: 1.5rem;
      line-height: 1;
      color: var(--ink-faint);
      transition: transform 0.45s cubic-bezier(.2,.7,.2,1), color 0.45s ease;
    }

    /* Footer */
    .footer {
      margin-top: 3.5rem;
      padding-top: 1.75rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--ink-soft);
      animation: rise 0.9s cubic-bezier(.2,.7,.2,1) 0.55s both;
    }
    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .footer a:hover { color: var(--oxblood); }
    .footer a svg { width: 16px; height: 16px; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 980px) {
      .quests { grid-template-columns: repeat(2, 1fr); }
      .hero { padding: 5rem 0 3rem; }
    }
    @media (max-width: 640px) {
      .page { padding: 1.5rem 1.25rem 2rem; }
      .quests { grid-template-columns: 1fr; }
      .hero { padding: 3.5rem 0 2.5rem; }
      .footer { flex-direction: column; gap: 1.25rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>the main quest</h1>
      <div class="flourish" aria-hidden="true">
        <span class="line"></span>
        <span class="diamond"></span>
        <span class="line"></span>
      </div>
      <p class="tagline">the side quest can wait</p>
    </section>

    <section class="quests" id="quests"></section>

      <a href="#" id="discord-link" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.211.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.331c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.974 0c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        join us on discord

  </div>

  <script>
    /* ============================================================
       APPS — Add or remove an entry to add or remove a quest card.
       Each entry: { name, blurb, url, icon }
         - name:  shown as the card title
         - blurb: one short line under the title (keep ~ 6–10 words)
         - url:   where the card links to
         - icon:  inline SVG string. Use viewBox="0 0 48 48",
                  stroke="currentColor", no fill. ~ 42px is rendered.
       ============================================================ */

    const APPS = [
      {
        name: 'The Lunch',
        blurb: 'Where to eat. Decided. No more discourse.',
        url: 'https://lunch.the-main.quest/',
        icon: `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 8 28 Q 24 46 40 28"/>
          <line x1="5" y1="28" x2="43" y2="28"/>
          <path d="M 16 22 Q 18 17 16 13 Q 14 9 16 5"/>
          <path d="M 24 22 Q 26 17 24 13 Q 22 9 24 5"/>
          <path d="M 32 22 Q 34 17 32 13 Q 30 9 32 5"/>
        </svg>`
      },
      {
        name: 'The Quest Log',
        blurb: "What's on. Track every quest.",
        url: 'https://log.the-main.quest/',
        icon: `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="24" cy="9" rx="16" ry="2.6"/>
          <line x1="8" y1="9" x2="8" y2="39"/>
          <line x1="40" y1="9" x2="40" y2="39"/>
          <ellipse cx="24" cy="39" rx="16" ry="2.6"/>
          <line x1="14" y1="19" x2="34" y2="19"/>
          <line x1="14" y1="26" x2="34" y2="26"/>
          <line x1="14" y1="33" x2="27" y2="33"/>
        </svg>`
      },
      {
        name: 'SGarant FM',
        blurb: 'Tune in. The shared station, always on.',
        url: 'https://radio.the-main.quest/',
        icon: `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="18" width="40" height="24" rx="2"/>
          <circle cx="34" cy="30" r="5.5"/>
          <circle cx="34" cy="30" r="1.3" fill="currentColor" stroke="none"/>
          <line x1="10" y1="25" x2="24" y2="25"/>
          <line x1="10" y1="30" x2="24" y2="30"/>
          <line x1="10" y1="35" x2="24" y2="35"/>
          <line x1="14" y1="18" x2="34" y2="6"/>
          <circle cx="34" cy="6" r="1.6" fill="currentColor" stroke="none"/>
        </svg>`
      }
    ];

    /* Discord invite URL — edit this to point at your server. */
    const DISCORD_URL = 'https://discord.gg/your-invite';

    /* ----------- render ----------- */
    const container = document.getElementById('quests');
    container.innerHTML = APPS.map(app => `
      <a class="card" href="${app.url}">
        <div class="card-head">
          <span class="icon-wrap">${app.icon}</span>
        </div>
        <div class="card-body">
          <h2>${app.name}</h2>
          <p>${app.blurb}</p>
        </div>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    `).join('');

    document.getElementById('discord-link').href = DISCORD_URL;
  </script>
</body>
</html>
